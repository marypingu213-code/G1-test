<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小一社會技巧：動畫 Emoji 闖關版</title>
    <style>
        :root { 
            --primary: #3498db; 
            --secondary: #9b59b6; 
            --success: #2ecc71; 
            --warning: #f1c40f; 
            --danger: #e74c3c; 
            --bg: #f8f9fa;
        }

        /* 禁止捲動，讓畫面固定在一個螢幕內 */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
        }

        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .container { 
            width: 95vw; 
            height: 95vh; 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative; /* 為了讓動畫 Emoji 絕對定位 */
        }

        /* 標題與文字 */
        h1 { font-size: 2rem; margin: 10px 0; color: var(--primary); }
        .question-text { font-size: 1.6rem; color: #d35400; font-weight: bold; margin-bottom: 10px; }

        /* 會跳動的 Emoji 動畫 */
        .bouncing-emoji {
            display: inline-block;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        /* 核心：圖片會根據剩下空間自動縮放 */
        .image-container { 
            flex: 1; /* 自動填滿剩餘空間 */
            min-height: 0; /* 關鍵：允許圖片縮得比原始尺寸小 */
            margin: 10px auto; 
            border: 6px solid var(--warning); 
            border-radius: 20px; 
            overflow: hidden; 
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 80%;
        }
        .image-container img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }

        /* 按鈕區塊：固定在下方 */
        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 100%;
            max-width: 800px; 
            margin: 10px auto; 
        }
        .helper-mode .options-grid { grid-template-columns: 1fr; } 

        button.btn { 
            padding: 15px; 
            font-size: 1.5rem; 
            cursor: pointer; 
            border: 3px solid var(--primary); 
            background: white; 
            border-radius: 15px; 
            font-weight: bold; 
            color: #2c3e50;
        }
        .correct { background: var(--success) !important; color: white !important; }
        .wrong { background: var(--danger) !important; color: white !important; }

        /* 抽籤卡片 */
        .card-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            flex: 1;
            align-content: center;
        }
        .lucky-card {
            aspect-ratio: 1 / 1.4;
            background: var(--secondary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border-radius: 15px;
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.3s ease-out;
        }
        .lucky-card:hover { transform: scale(1.05); }

        .feedback-box { 
            background: #fff9db; 
            border: 3px dashed var(--warning); 
            padding: 15px; 
            border-radius: 15px; 
            margin-top: 10px;
        }
        .feedback-text { font-size: 1.6rem; color: #856404; font-weight: bold; margin: 0; }
        
        .nav-btns { margin-top: 15px; display: flex; justify-content: center; gap: 20px; }
        .next-btn { padding: 12px 40px; background: var(--secondary); color: white; border: none; border-radius: 50px; cursor: pointer; font-size: 1.5rem; }
        .home-btn { padding: 8px 25px; background: #95a5a6; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1.1rem; }

        /* 時鐘 */
        #live-clock { 
            position: fixed; bottom: 10px; left: 10px; 
            background: rgba(44, 62, 80, 0.9); color: white; 
            padding: 8px 15px; border-radius: 10px; 
            font-size: 1.2rem; font-family: monospace; z-index: 1000; 
        }

        /* 主選單卡片 */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex: 1; align-content: center; }
        .menu-card { padding: 30px; border-radius: 20px; border: 5px solid var(--primary); cursor: pointer; background: white; }
        .menu-card h2 { font-size: 2rem; margin: 10px 0; color: var(--primary); }

        /* 動畫 Emoji 元素 粒子 */
        .animated-emoji {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none; /* 讓 Emoji 不會被點擊 */
            animation: particle 1.5s ease-out forwards;
        }

        @keyframes particle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="main-menu" class="container">
        <h1>🔍 社會技巧實驗室</h1>
        <div class="menu-grid">
            <div class="menu-card" onclick="startGame('emotion')">
                <span style="font-size: 4rem;">🔍</span>
                <h2>情緒小偵探</h2>
            </div>
            <div class="menu-card" onclick="startGame('helper')">
                <span style="font-size: 4rem;">🤝</span>
                <h2>小小助人高手</h2>
            </div>
        </div>
    </div>

    <div id="game-container" class="container" style="display: none;">
        <div id="q-text" class="question-text"></div>
        
        <div id="card-selection" class="card-grid" style="display: none;">
            <div class="lucky-card" onclick="revealScenario(0)">1</div>
            <div class="lucky-card" onclick="revealScenario(1)">2</div>
            <div class="lucky-card" onclick="revealScenario(2)">3</div>
            <div class="lucky-card" onclick="revealScenario(3)">4</div>
            <div class="lucky-card" onclick="revealScenario(4)">5</div>
        </div>

        <div id="result-display" style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
            <div class="image-container">
                <img id="display-img" src="" alt="圖片">
            </div>
            <div id="options-bin" class="options-grid"></div>
        </div>
        
        <div id="feedback-area" class="feedback-box" style="display: none;">
            <p class="feedback-text" id="feedback-msg"></p>
        </div>

        <div class="nav-btns">
            <button class="home-btn" onclick="goHome()">回選單</button>
            <button id="next-btn" class="next-btn" onclick="nextStep()" style="display: none;">下一題 ➔</button>
        </div>
    </div>

    <div id="live-clock">載入時間...</div>

    <script>
        const emotionData = [
            { name: "開心", img: "image/happy.png", options: ["開心", "難過"], correct: 0, ref: "什麼時候你也會感覺「開心」呢？" },
            { name: "生氣", img: "image/anger.png", options: ["害怕", "生氣"], correct: 1, ref: "生氣時，你會怎麼讓自己冷靜？" },
            { name: "難過", img: "image/sad.png", options: ["難過", "高興"], correct: 0, ref: "難過時，你希望別人對你說什麼？" },
            { name: "害怕", img: "image/fear.png", options: ["害怕", "冷靜"], correct: 0, ref: "什麼事情會讓你覺得「害怕」？" },
            { name: "討厭", img: "image/hate.png", options: ["討厭", "開心"], correct: 0, ref: "「討厭」時，你會怎麼告訴老師？" },
            { name: "高興", img: "image/glad.png", options: ["難過", "高興"], correct: 1, ref: "今天有發生讓你「高興」的事嗎？" },
            { name: "冷靜", img: "image/chill.png", options: ["生氣", "冷靜"], correct: 1, ref: "深呼吸可以讓你感到「冷靜」嗎？" }
        ];

        const helperData = [
            { scenario: "情境一：她跑步跌倒了，看起來很痛...", img: "image/sad.png", options: ["拿衛生紙給她", "笑她是愛哭鬼", "請老師來幫忙"], correct: [0, 2], feedback: "給予關懷或請老師幫忙，都是最棒的！" },
            { scenario: "情境二：她找不到畫筆，急得快哭了...", img: "image/fear.png", options: ["問她：需要幫忙嗎？", "不理她繼續畫", "陪著她一起找"], correct: [0, 2], feedback: "主動詢問與陪伴，能讓對方不再害怕。" },
            { scenario: "情境三：她一個人坐在位子上，看起來寂寞...", img: "image/sad.png", options: ["主動邀請：一起玩？", "當作沒看到", "請老師找他玩"], correct: [0, 2], feedback: "溫暖的邀請或請老師幫忙，不讓同學孤單。" },
            { scenario: "情境四：她彩色筆掉滿地，亂七八糟的...", img: "image/fear.png", options: ["幫他捡起來", "笑他笨手笨腳", "去請老師來協助"], correct: [0, 2], feedback: "伸出援手或找老師協助，才是好方法！" },
            { scenario: "情境五：她的積木都被同學拿走了，很難過...", img: "image/sad.png", options: ["問他：輪流玩好嗎？", "直接搶過來", "請老師幫忙協調"], correct: [0, 2], feedback: "輪流玩或請老師幫忙，大家都開心！" }
        ];

        let currentMode = '';
        let currentIdx = 0;
        let isPracticeMode = false;

        function startGame(mode) {
            currentMode = mode;
            currentIdx = 0;
            isPracticeMode = false;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('card-selection').style.display = 'none';
            document.getElementById('result-display').style.display = 'flex';
            
            if (mode === 'helper') document.getElementById('game-container').classList.add('helper-mode');
            else document.getElementById('game-container').classList.remove('helper-mode');
            
            loadContent();
        }

        function loadContent() {
            const feedback = document.getElementById('feedback-area');
            const nextBtn = document.getElementById('next-btn');
            const bin = document.getElementById('options-bin');
            feedback.style.display = 'none';
            nextBtn.style.display = 'none';
            bin.style.display = 'grid';
            bin.innerHTML = '';

            if (currentMode === 'emotion') {
                const q = emotionData[currentIdx];
                document.getElementById('q-text').innerText = "這張臉是什麼感覺呢？";
                document.getElementById('display-img').src = q.img;
                q.options.forEach((opt, idx) => createButton(opt, idx === q.correct));
            } else {
                const m = helperData[currentIdx];
                document.getElementById('q-text').innerText = m.scenario;
                document.getElementById('display-img').src = m.img;
                m.options.forEach((opt, idx) => createButton(opt, m.correct.includes(idx)));
            }
        }

        function createButton(text, isCorrect) {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = text;
            btn.onclick = () => handleChoice(isCorrect, btn);
            document.getElementById('options-bin').appendChild(btn);
        }

        function handleChoice(isCorrect, btn) {
            if (isCorrect) {
                btn.classList.add('correct');
                document.querySelectorAll('.btn').forEach(b => b.disabled = true);
                setTimeout(() => {
                    document.getElementById('options-bin').style.display = 'none';
                    document.getElementById('feedback-area').style.display = 'block';
                    const msg = (currentMode === 'emotion') ? emotionData[currentIdx].ref : helperData[currentIdx].feedback;
                    document.getElementById('feedback-msg').innerText = msg;
                    document.getElementById('next-btn').style.display = 'inline-block';
                }, 500);
            } else {
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 800);
            }
        }

        function nextStep() {
            currentIdx++;
            const max = (currentMode === 'emotion') ? emotionData.length : helperData.length;
            if (currentIdx < max) {
                loadContent();
            } else if (currentMode === 'helper' && !isPracticeMode) {
                startPractice();
            } else {
                goHome();
            }
        }

        function startPractice() {
            isPracticeMode = true;
            document.getElementById('q-text').innerHTML = "🌟 抽籤大挑戰<span class='bouncing-emoji'>🤩</span>：選卡片上台練習！";
            document.getElementById('result-display').style.display = 'none';
            document.getElementById('feedback-area').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('card-selection').style.display = 'grid';
            document.querySelectorAll('.lucky-card').forEach(c => c.style.visibility = 'visible');
        }

        function revealScenario(idx) {
            const m = helperData[idx];
            document.getElementById('card-selection').style.display = 'none';
            document.getElementById('result-display').style.display = 'flex';
            document.getElementById('q-text').innerText = "任務：" + m.scenario;
            document.getElementById('display-img').src = m.img;
            document.getElementById('options-bin').style.display = 'none';
            document.getElementById('feedback-area').style.display = 'block';
            document.getElementById('feedback-msg').innerText = "請小朋友上台練習喔！";
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = "完成 ➔";
            nextBtn.style.display = 'inline-block';
            nextBtn.onclick = startPractice;

            // 觸發慶祝動畫 Emoji
            createAnimatedEmojis(15);
        }

        function createAnimatedEmojis(count) {
            const emojis = ['✨', '🎉', '🎈', '🤩', '💖', '🎈'];
            const container = document.getElementById('game-container');
            for (let i = 0; i < count; i++) {
                const emoji = document.createElement('div');
                emoji.classList.add('animated-emoji');
                emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                // 設定隨機方向
                const x = (Math.random() - 0.5) * 600; // 左右隨機偏移
                const y = -Math.random() * 400 - 100; // 隨機向上噴發
                emoji.style.setProperty('--x', `${x}px`);
                emoji.style.setProperty('--y', `${y}px`);
                
                // 設定隨機延遲和大小
                emoji.style.animationDelay = `${Math.random() * 0.5}s`;
                emoji.style.fontSize = `${1 + Math.random() * 1}rem`;

                container.appendChild(emoji);
                
                // 動畫結束後移除元素
                setTimeout(() => {
                    emoji.remove();
                }, 2000); // 動畫時間(1.5s) + 延遲時間(0.5s)
            }
        }

        function goHome() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('game-container').style.display = 'none';
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
