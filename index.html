<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社會技巧：選擇大挑戰 (可愛大字版)</title>
    <!-- 引入圓潤字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #54a0ff; 
            --secondary: #a29bfe; 
            --success: #26de81; 
            --warning: #ffeaa7; 
            --danger: #ff7675; 
            --bg: #fffcf0;
            --text: #2d3436;
            --instruction-color: #ff9f43; /* 參考圖片的橘色 */
        }

        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: 'Quicksand', 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
        }

        body { display: flex; align-items: center; justify-content: center; }
        
        .container { 
            width: 98vw; 
            height: 98vh; 
            background: white; 
            padding: 20px; 
            border-radius: 60px; 
            box-shadow: 0 20px 0px rgba(0,0,0,0.05); 
            text-align: center; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
            border: 10px solid #f1f2f6;
        }

        /* 標題與導引文字樣式 */
        h1 { 
            font-size: 4.5rem; 
            margin: 5px 0; 
            color: var(--primary); 
            font-weight: 900;
            text-shadow: 4px 4px 0px #dff9fb;
            letter-spacing: 5px;
        }
        
        /* 參考圖片修改為暖橘色導引文字 */
        .instruction { 
            font-size: 3.5rem; 
            color: var(--instruction-color); 
            font-weight: bold; 
            margin-bottom: 5px;
            text-shadow: 2px 2px 0px #fff;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }

        /* 圖片容器：極大化 */
        .content-viewer { 
            flex: 1; 
            min-height: 0; 
            margin: 10px auto; 
            border: 10px solid var(--warning); 
            border-radius: 50px; 
            overflow: hidden; 
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 98%; /* 圖片容器更寬 */
            position: relative;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.05);
        }
        .content-viewer img { 
            width: 100%;
            height: 100%;
            object-fit: contain; /* 保持比例但盡量撐大 */
        }

        /* 互動加分格 */
        #score-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 98%;
            padding: 10px;
        }
        .student-card {
            background: #f1f2f6;
            border: 5px solid var(--primary);
            border-radius: 40px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .student-name { font-size: 2.5rem; font-weight: bold; color: var(--text); margin-bottom: 5px; }
        .student-score { 
            font-size: 4.5rem; 
            font-weight: 900; 
            color: var(--danger); 
            margin-bottom: 10px;
        }
        .add-btn {
            width: 100%;
            padding: 10px;
            font-size: 2.2rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 0px #21b677;
            transition: all 0.1s;
        }
        .add-btn:active { transform: translateY(4px); box-shadow: 0 4px 0px #21b677; }

        /* 選項按鈕 */
        .choices-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 
            width: 100%;
            max-width: 1200px; 
            margin: 10px auto; 
        }
        button.choice-btn { 
            padding: 25px; 
            font-size: 2.5rem; 
            cursor: pointer; 
            border: 8px solid var(--primary); 
            background: white; 
            border-radius: 50px; 
            font-weight: bold; 
            box-shadow: 0 10px 0px #dff9fb;
        }

        /* 導覽按鈕 */
        .nav-grid { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 10px; }
        .nav-btn { 
            padding: 15px 60px; 
            font-size: 2.5rem; 
            cursor: pointer; 
            border-radius: 80px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            font-weight: bold;
            box-shadow: 0 8px 0px #2980b9;
        }
        
        .home-btn { padding: 12px 40px; background: #dfe6e9; color: #636e72; border: none; border-radius: 25px; cursor: pointer; font-size: 2rem; font-weight: bold; }

        /* 回饋遮罩 */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 50px;
        }
        .feedback-icon { font-size: 10rem; margin-bottom: 20px; }
        .feedback-title { font-size: 4.5rem; font-weight: bold; color: var(--primary); }
        .feedback-desc { font-size: 2.8rem; padding: 0 80px; margin-top: 25px; color: #636e72; }

        #live-clock { 
            position: fixed; bottom: 20px; left: 20px; 
            background: #2d3436; color: white; 
            padding: 12px 25px; border-radius: 20px; 
            font-size: 1.8rem; font-family: 'Quicksand', monospace; z-index: 1000; 
        }

        .bounce { animation: bounce 1s infinite alternate; display: inline-block; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <!-- 主選單 -->
    <div id="main-menu" class="container">
        <h1 style="font-size: 7rem;">🤔 選擇大挑戰</h1>
        <p style="font-size: 3rem; color: #636e72;">小朋友，遇見問題該怎麼辦？</p>
        <div style="font-size: 12rem; margin: 30px;" class="bounce">🌟</div>
        <div style="display: grid; grid-template-columns: 1fr; gap: 40px; max-width: 650px; margin: 0 auto; width: 100%;">
            <button onclick="startMode('book')" style="padding: 35px; font-size: 3.5rem; background: var(--warning); border: none; border-radius: 40px; cursor: pointer; font-weight: bold; box-shadow: 0 10px 0px #fed330;">📖 繪本故事</button>
            <button onclick="startMode('challenge')" style="padding: 35px; font-size: 3.5rem; background: var(--success); border: none; border-radius: 40px; cursor: pointer; color: white; font-weight: bold; box-shadow: 0 10px 0px #21b677;">🎮 選擇大挑戰</button>
        </div>
    </div>

    <!-- 遊戲/導讀區域 -->
    <div id="game-area" class="container" style="display: none;">
        <h1 id="mode-title"></h1>
        <div id="instr" class="instruction"></div>
        
        <div class="content-viewer">
            <img id="display-img" src="" alt="繪本圖片">
            <div id="score-grid" style="display: none;"></div>

            <!-- 回饋遮罩 -->
            <div id="feedback-overlay" class="feedback-overlay">
                <div id="fb-icon" class="feedback-icon"></div>
                <div id="fb-title" class="feedback-title"></div>
                <div id="fb-desc" class="feedback-desc"></div>
                <button class="nav-btn" style="margin-top: 50px; background: var(--secondary); box-shadow: 0 8px 0px #6c5ce7;" onclick="closeFeedback()">我知道了！</button>
            </div>
        </div>

        <!-- 導讀模式導覽 -->
        <div id="book-nav" class="nav-grid" style="display: none;">
            <button id="prev-btn" class="nav-btn" onclick="changePage(-1)">⬅ 上一頁</button>
            <span id="page-info" style="font-size: 3rem; font-weight: bold; color: var(--primary);"></span>
            <button id="next-btn" class="nav-btn" onclick="changePage(1)">下一頁 ➡</button>
        </div>

        <!-- 挑戰模式按鈕 -->
        <div id="challenge-options" class="choices-grid" style="display: none;">
            <button id="opt-a" class="choice-btn" style="border-color: #ff9f43; color:#ff9f43;" onclick="makeChoice(0)"></button>
            <button id="opt-b" class="choice-btn" style="border-color: #54a0ff; color:#54a0ff;" onclick="makeChoice(1)"></button>
        </div>

        <div class="nav-btns" style="position: absolute; top: 30px; right: 30px;">
            <button class="home-btn" onclick="goHome()">🏠 回主選單</button>
        </div>
    </div>

    <div id="live-clock">載入中...</div>

    <script>
        const students = ["盧楷", "意欣", "沄恩", "澄洋", "齊安", "欽銓", "宇晴"];
        let studentScores = {};
        students.forEach(s => studentScores[s] = 0);

        // 幻燈片結構
        let slides = [];
        for (let i = 1; i <= 16; i++) {
            slides.push({ type: 'image', src: `images/${i}.jpg` });
            if (i >= 3 && i <= 15) {
                slides.push({ type: 'score' });
            }
        }

        const challengeData = [
            {
                scenario: "看到同學在位子上哭得很難過...",
                img: "images/1.jpg",
                options: [
                    { text: "A. 問他：你還好嗎？", correct: true, icon: "🍭", title: "好棒的選擇", desc: "同學心裡暖暖的，他知道有人關心他。" },
                    { text: "B. 裝作沒看到走開", correct: false, icon: "☁️", title: "可以更好喔", desc: "同學會覺得很孤單，沒人想幫他。" }
                ]
            },
            {
                scenario: "下課了，好想加入大家的遊戲...",
                img: "images/5.jpg",
                options: [
                    { text: "A. 直接衝進去搶玩具", correct: false, icon: "🌪️", title: "大家會傷心", desc: "同學會不開心，下次可能就不想跟你玩了。" },
                    { text: "B. 有禮貌問：我可以一起玩嗎？", correct: true, icon: "🎈", title: "受歡迎的第一步", desc: "大家覺得你有禮貌，會很歡迎你加入！" }
                ]
            }
        ];

        let currentMode = '';
        let slideIdx = 0;
        let challengeIdx = 0;

        function startMode(mode) {
            currentMode = mode;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            
            if(mode === 'book') {
                document.getElementById('mode-title').innerText = "📘 繪本故事時間";
                document.getElementById('mode-title').style.color = "#54a0ff";
                document.getElementById('book-nav').style.display = 'flex';
                document.getElementById('challenge-options').style.display = 'none';
                slideIdx = 0;
                updateSlide();
            } else {
                document.getElementById('mode-title').innerText = "🎮 選擇大挑戰";
                document.getElementById('book-nav').style.display = 'none';
                document.getElementById('challenge-options').style.display = 'grid';
                challengeIdx = 0;
                updateChallenge();
            }
        }

        function updateSlide() {
            const slide = slides[slideIdx];
            const imgEl = document.getElementById('display-img');
            const scoreGrid = document.getElementById('score-grid');
            const instr = document.getElementById('instr');

            if (slide.type === 'image') {
                imgEl.style.display = 'block';
                scoreGrid.style.display = 'none';
                imgEl.src = slide.src;
                instr.innerText = "我們一起看故事...";
            } else {
                imgEl.style.display = 'none';
                scoreGrid.style.display = 'grid';
                instr.innerText = "✨ 互動加分時間！";
                renderScores();
            }
            
            document.getElementById('page-info').innerText = `${slideIdx + 1} / ${slides.length}`;
            document.getElementById('prev-btn').disabled = (slideIdx === 0);
            document.getElementById('next-btn').disabled = (slideIdx === slides.length - 1);
        }

        function renderScores() {
            const grid = document.getElementById('score-grid');
            grid.innerHTML = '';
            students.forEach(name => {
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <div class="student-name">${name}</div>
                    <div class="student-score" id="score-${name}">${studentScores[name]}</div>
                    <button class="add-btn" onclick="addPoint('${name}')">+1</button>
                `;
                grid.appendChild(card);
            });
        }

        function addPoint(name) {
            studentScores[name]++;
            const scoreEl = document.getElementById(`score-${name}`);
            scoreEl.innerText = studentScores[name];
            scoreEl.animate([
                { transform: 'scale(1)' },
                { transform: 'scale(1.4)', color: '#ff7675' },
                { transform: 'scale(1)' }
            ], { duration: 300 });
        }

        function changePage(delta) {
            slideIdx += delta;
            updateSlide();
        }

        function updateChallenge() {
            const q = challengeData[challengeIdx];
            document.getElementById('instr').innerText = q.scenario;
            document.getElementById('display-img').style.display = 'block';
            document.getElementById('score-grid').style.display = 'none';
            document.getElementById('display-img').src = q.img;
            document.getElementById('opt-a').innerText = q.options[0].text;
            document.getElementById('opt-b').innerText = q.options[1].text;
        }

        function makeChoice(idx) {
            const q = challengeData[challengeIdx];
            const choice = q.options[idx];
            document.getElementById('fb-icon').innerText = choice.icon;
            document.getElementById('fb-title').innerText = choice.title;
            document.getElementById('fb-desc').innerText = choice.desc;
            document.getElementById('feedback-overlay').style.display = 'flex';
        }

        function closeFeedback() {
            document.getElementById('feedback-overlay').style.display = 'none';
            challengeIdx++;
            if(challengeIdx < challengeData.length) {
                updateChallenge();
            } else {
                alert("🎉 任務挑戰成功！");
                goHome();
            }
        }

        function goHome() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('game-area').style.display = 'none';
        }

        function updateClock() {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('zh-TW', {hour12:false});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
