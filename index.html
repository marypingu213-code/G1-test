<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社會技巧：選擇大挑戰 (口說與輪盤版)</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #54a0ff; 
            --secondary: #a29bfe; 
            --success: #26de81; 
            --warning: #ffeaa7; 
            --danger: #ff7675; 
            --bg: #fffcf0;
            --text: #2d3436;
            --instruction-color: #ff9f43; 
        }

        /* 全螢幕設置 */
        html, body { 
            height: 100vh; 
            width: 100vw;
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: 'Quicksand', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { 
            width: 98vw; 
            height: 96vh; 
            background: white; 
            padding: 15px; 
            border-radius: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border: 8px solid #f1f2f6;
            position: relative;
        }

        /* 標題與導引 */
        h1 { 
            font-size: 3.2rem; 
            margin: 5px 0; 
            color: var(--primary); 
            font-weight: 900;
            text-shadow: 3px 3px 0px #dff9fb;
        }
        
        .instruction { 
            font-size: 2.5rem; 
            color: var(--instruction-color); 
            font-weight: bold; 
            margin: 0;
            text-shadow: 1px 1px 0px #fff;
            text-align: left;
        }

        /* 頂部資訊列 (包含導引與抽籤輪盤) */
        .top-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 96%;
            margin: 0 auto 5px auto;
            min-height: 60px;
        }

        /* 名字輪盤設計 - 設定 margin-left: auto 確保它靠右不會蓋到紅綠燈 */
        .roulette-container {
            background: #fff9db;
            border: 4px solid #f1c40f;
            border-radius: 20px;
            padding: 5px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
            margin-left: auto;
        }
        .roulette-name {
            font-size: 3rem;
            font-weight: 900;
            color: #d35400;
            min-width: 120px;
            text-align: center;
            transition: transform 0.2s;
        }
        .spin-btn {
            padding: 8px 20px;
            font-size: 1.6rem;
            background: #ff9f43;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0px #e67e22;
        }
        .spin-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 紅綠燈提示器樣式 */
        .traffic-light-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2d3436;
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        .light-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #444; 
            transition: 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .light-circle:hover { border-color: white; }
        .light-red.active { background: #ff4757; box-shadow: 0 0 25px #ff4757; }
        .light-yellow.active { background: #eccc68; box-shadow: 0 0 25px #eccc68; }
        .light-green.active { background: #2ecc71; box-shadow: 0 0 25px #2ecc71; }
        .light-label {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            min-width: 140px;
            text-align: left;
        }

        /* 首頁嘴巴提示圖示 */
        .mouth-indicator {
            font-size: 10rem;
            margin: 10px 0;
            background: #f1f2f6;
            width: 250px;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 10px auto;
            border: 8px solid var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .mouth-label {
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 10px;
        }

        /* 核心內容區：拉大垂直空間 */
        .content-viewer { 
            flex: 1; 
            min-height: 0; 
            margin: 0 auto 10px; 
            border: 8px solid var(--warning); 
            border-radius: 30px; 
            overflow: hidden; 
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 98%; 
            position: relative;
        }
        .content-viewer img { 
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
        }

        /* 語音輸入練習區 */
        .voice-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: #f8faff;
        }
        .mic-btn {
            font-size: 8rem;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 10px solid var(--primary);
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
            margin: 30px 0;
        }
        .mic-btn.recording {
            border-color: #ff4757;
            box-shadow: 0 0 40px rgba(255, 71, 87, 0.6);
            animation: pulse 1.5s infinite;
        }
        .speech-box {
            min-height: 120px;
            width: 85%;
            background: white;
            border-radius: 25px;
            border: 5px dashed var(--secondary);
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--text);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* 按鈕區域 */
        .choices-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            width: 100%;
            max-width: 1000px; 
            margin: 10px auto; 
        }
        button.choice-btn { 
            padding: 15px; 
            font-size: 2.2rem; 
            cursor: pointer; 
            border: 6px solid var(--primary); 
            background: white; 
            border-radius: 30px; 
            font-weight: bold; 
        }

        /* 底部導覽區域整合 */
        .nav-grid { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 100%; 
            gap: 40px; 
            margin-top: 5px; 
            min-height: 60px;
        }
        .nav-btn { 
            padding: 10px 40px; 
            font-size: 1.8rem; 
            cursor: pointer; 
            border-radius: 40px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            font-weight: bold;
            box-shadow: 0 5px 0px #2980b9;
        }
        .nav-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        /* 回主選單按鈕，移除絕對定位，排入 nav-grid 裡 */
        .home-btn { 
            padding: 10px 30px; 
            background: #dfe6e9; 
            color: #636e72; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            font-size: 1.6rem; 
            font-weight: bold; 
            box-shadow: 0 5px 0px #b2bec3;
            transition: 0.2s;
        }
        .home-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #live-clock { 
            position: fixed; bottom: 15px; left: 15px; 
            background: #2d3436; color: white; 
            padding: 8px 20px; border-radius: 15px; 
            font-size: 1.4rem; font-family: monospace; z-index: 1000; 
        }

        /* 首頁頁碼選擇器 */
        .page-selector {
            background: #f1f2f6; 
            padding: 10px 20px; 
            border-radius: 20px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            margin: 10px auto; 
            width: fit-content;
        }
        .page-selector select {
            font-size: 1.8rem; 
            padding: 5px 10px; 
            border-radius: 10px; 
            border: 3px solid var(--primary); 
            font-family: 'Quicksand', sans-serif; 
            font-weight: bold; 
            color: var(--text); 
            outline: none;
            cursor: pointer;
        }

        .bounce { animation: bounce 1s infinite alternate; display: inline-block; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 50px;
        }
    </style>
</head>
<body>

    <!-- 紅綠燈指示器 -->
    <div class="traffic-light-container">
        <div id="light-red" class="light-circle light-red" onclick="setTrafficLight('red')"></div>
        <div id="light-yellow" class="light-circle light-yellow" onclick="setTrafficLight('yellow')"></div>
        <div id="light-green" class="light-circle light-green" onclick="setTrafficLight('green')"></div>
        <div id="light-label" class="light-label">準備開始</div>
    </div>

    <!-- 主選單 -->
    <div id="main-menu" class="container">
        <h1>🤔 選擇大挑戰</h1>
        
        <div class="mouth-indicator">
            <span id="home-mouth-icon" style="font-size: 8rem;">🤐</span>
            <div id="home-mouth-label" class="mouth-label">嘴巴閉閉</div>
        </div>

        <p style="font-size: 2.2rem; color: #636e72;">小朋友，遇見問題該怎麼辦？</p>
        
        <div style="display: flex; flex-direction: column; gap: 10px; max-width: 600px; margin: 0 auto; width: 100%;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <button onclick="startMode('book')" style="padding: 25px; font-size: 2.8rem; background: var(--warning); border: none; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 0px #fed330;">📖 繪本故事</button>
                <button onclick="startMode('challenge')" style="padding: 25px; font-size: 2.8rem; background: var(--success); border: none; border-radius: 30px; cursor: pointer; color: white; font-weight: bold; box-shadow: 0 8px 0px #21b677;">🎮 選擇大挑戰</button>
            </div>
            
            <!-- 新增：起始頁數選擇器 -->
            <div class="page-selector">
                <span style="font-size: 1.8rem; font-weight: bold; color: #636e72;">從第幾頁開始講：</span>
                <select id="start-page-select">
                    <!-- Javascript 自動產生 1 到 16 頁的選項 -->
                </select>
            </div>
        </div>
    </div>

    <!-- 遊戲/導讀區域 -->
    <div id="game-area" class="container" style="display: none;">
        
        <!-- 頂部資訊列：導引文字 + 名字輪盤 -->
        <div class="top-info-bar" id="top-info-bar">
            <!-- 導引文字，在純看圖片時會自動隱藏，把空間還給圖片 -->
            <div id="instr" class="instruction"></div>
            <div id="roulette-box" class="roulette-container" style="display: none;">
                <span style="font-size: 1.6rem; font-weight: bold; color: #636e72;">點將錄：</span>
                <div id="roulette-name" class="roulette-name">❓❓</div>
                <button class="spin-btn" onclick="spinRoulette()">抽籤</button>
            </div>
        </div>

        <div class="content-viewer">
            <!-- 繪本圖片 -->
            <img id="display-img" src="" alt="繪本圖片">
            
            <!-- 語音輸入練習區 -->
            <div id="voice-area" class="voice-area" style="display: none;">
                <h2 style="font-size: 4.5rem; color: var(--primary); margin: 0;">🎤 大聲說說看</h2>
                <p style="font-size: 2.5rem; color: #ff9f43; margin: 10px 0;">點擊麥克風，勇敢說出你的想法！</p>
                <button id="mic-btn" class="mic-btn" onclick="toggleRecording()">🎙️</button>
                <div id="speech-result" class="speech-box">（你說的話會變成字跑出來喔...）</div>
            </div>

            <!-- 回饋遮罩 -->
            <div id="feedback-overlay" class="feedback-overlay">
                <div id="fb-icon" style="font-size: 8rem;"></div>
                <div id="fb-title" style="font-size: 3.5rem; font-weight: bold; color: var(--primary);"></div>
                <div id="fb-desc" style="font-size: 2.2rem; padding: 0 60px; margin-top: 15px; color: #636e72;"></div>
                <button class="nav-btn" style="margin-top: 30px; background: var(--secondary); box-shadow: 0 6px 0px #6c5ce7;" onclick="closeFeedback()">我知道了！</button>
            </div>
        </div>

        <div id="challenge-options" class="choices-grid" style="display: none;">
            <button id="opt-a" class="choice-btn" style="border-color: #ff9f43; color:#ff9f43;" onclick="makeChoice(0)"></button>
            <button id="opt-b" class="choice-btn" style="border-color: #54a0ff; color:#54a0ff;" onclick="makeChoice(1)"></button>
        </div>

        <!-- 底部導覽列：整合「上一頁/下一頁」與「回主選單」 -->
        <div class="nav-grid">
            <div id="book-nav" style="display: none; align-items: center; gap: 20px;">
                <button id="prev-btn" class="nav-btn" onclick="changePage(-1)">⬅ 上一頁</button>
                <span id="page-info" style="font-size: 2.5rem; font-weight: bold; color: var(--primary);"></span>
                <button id="next-btn" class="nav-btn" onclick="changePage(1)">下一頁 ➡</button>
            </div>
            <button class="home-btn" onclick="goHome()">🏠 回主選單</button>
        </div>
    </div>

    <div id="live-clock">載入中...</div>

    <script>
        const students = ["盧楷", "意欣", "沄恩", "澄洋", "齊安", "欽銓", "宇晴"];
        
        // 幻燈片資料，包含圖片與語音模式
        let slides = [];
        for (let i = 1; i <= 16; i++) {
            slides.push({ type: 'image', src: `images/${i}.jpg` });
            if (i >= 3 && i <= 15) {
                slides.push({ type: 'voice' });
            }
        }

        const challengeData = [
            {
                scenario: "看到同學在位子上哭得很難過...",
                img: "images/1.jpg",
                options: [
                    { text: "A. 問他：你還好嗎？", correct: true, icon: "🍭", title: "好棒的選擇", desc: "同學心裡暖暖的，他知道有人關心他。" },
                    { text: "B. 裝作沒看到走開", correct: false, icon: "☁️", title: "可以更好喔", desc: "同學會覺得很孤單，沒人想幫他。" }
                ]
            },
            {
                scenario: "下課了，好想加入大家的遊戲...",
                img: "images/5.jpg",
                options: [
                    { text: "A. 直接衝進去搶玩具", correct: false, icon: "🌪️", title: "大家會傷心", desc: "同學會不開心，下次可能就不想跟你玩了。" },
                    { text: "B. 有禮貌問：我可以一起玩嗎？", correct: true, icon: "🎈", title: "受歡迎的第一步", desc: "大家覺得你有禮貌，會很歡迎你加入！" }
                ]
            }
        ];

        let currentMode = '';
        let slideIdx = 0;
        let challengeIdx = 0;

        // --- 載入時自動產生頁碼選項 ---
        window.onload = function() {
            const selectEl = document.getElementById('start-page-select');
            for (let i = 1; i <= 16; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.innerText = `第 ${i} 頁`;
                selectEl.appendChild(opt);
            }
        };

        // --- 語音辨識功能 (Web Speech API) ---
        let recognition;
        let isRecording = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW';

            recognition.onstart = function() {
                isRecording = true;
                const micBtn = document.getElementById('mic-btn');
                micBtn.classList.add('recording');
                document.getElementById('speech-result').innerText = "👂 正在聽你說話喔...";
            };

            recognition.onresult = function(event) {
                let interimTranscript = '';
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                const resultBox = document.getElementById('speech-result');
                if (finalTranscript) {
                    resultBox.innerText = finalTranscript;
                    resultBox.style.color = 'var(--primary)';
                } else if (interimTranscript) {
                    resultBox.innerText = interimTranscript;
                    resultBox.style.color = '#7f8c8d';
                }
            };

            recognition.onerror = function(event) {
                console.error("Speech Error:", event.error);
                document.getElementById('speech-result').innerText = "哎呀，沒有聽到聲音喔，請再按一次試試看！";
                stopRecording();
            };

            recognition.onend = function() {
                stopRecording();
            };
        }

        function toggleRecording() {
            if (!recognition) {
                alert("很抱歉，您的瀏覽器不支援語音功能喔！請使用 Google Chrome 瀏覽器。");
                return;
            }
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function stopRecording() {
            isRecording = false;
            document.getElementById('mic-btn').classList.remove('recording');
        }

        // --- 名字輪盤抽籤功能 ---
        let spinInterval;
        function spinRoulette() {
            if (spinInterval) clearInterval(spinInterval);
            let times = 0;
            const nameEl = document.getElementById('roulette-name');
            nameEl.style.color = '#7f8c8d'; 
            
            spinInterval = setInterval(() => {
                const randomName = students[Math.floor(Math.random() * students.length)];
                nameEl.innerText = randomName;
                times++;
                if (times > 20) { 
                    clearInterval(spinInterval);
                    spinInterval = null;
                    nameEl.style.color = '#e74c3c'; 
                    nameEl.style.transform = "scale(1.3)";
                    setTimeout(() => nameEl.style.transform = "scale(1)", 300);
                }
            }, 100);
        }

        // --- 紅綠燈與模式控制 ---
        function setTrafficLight(color) {
            const red = document.getElementById('light-red');
            const yellow = document.getElementById('light-yellow');
            const green = document.getElementById('light-green');
            const label = document.getElementById('light-label');
            const mouthIcon = document.getElementById('home-mouth-icon');
            const mouthLabel = document.getElementById('home-mouth-label');
            
            red.classList.remove('active');
            yellow.classList.remove('active');
            green.classList.remove('active');

            if (color === 'red') {
                red.classList.add('active');
                label.innerText = '🔴 嘴巴閉起來';
                if (mouthIcon) { mouthIcon.innerText = '🤐'; mouthLabel.innerText = '嘴巴閉閉'; }
            } else if (color === 'yellow') {
                yellow.classList.add('active');
                label.innerText = '🟡 準備好了嗎';
                if (mouthIcon) { mouthIcon.innerText = '🤔'; mouthLabel.innerText = '等一下下'; }
            } else if (color === 'green') {
                green.classList.add('active');
                label.innerText = '🟢 現在可以說話';
                if (mouthIcon) { mouthIcon.innerText = '🗣️'; mouthLabel.innerText = '請說說看'; }
            }
        }

        function startMode(mode) {
            currentMode = mode;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            
            if(mode === 'book') {
                document.getElementById('book-nav').style.display = 'flex';
                document.getElementById('challenge-options').style.display = 'none';
                
                // 讀取老師選擇的起始頁碼
                const selectedPage = parseInt(document.getElementById('start-page-select').value, 10);
                let targetIdx = 0;
                // 找出該頁碼對應的第一張圖片在 slides 裡的 index
                for (let i = 0; i < slides.length; i++) {
                    if (slides[i].type === 'image' && slides[i].src === `images/${selectedPage}.jpg`) {
                        targetIdx = i;
                        break;
                    }
                }
                slideIdx = targetIdx;
                updateSlide();
            } else {
                document.getElementById('book-nav').style.display = 'none';
                document.getElementById('challenge-options').style.display = 'grid';
                document.getElementById('roulette-box').style.display = 'none'; 
                challengeIdx = 0;
                setTrafficLight('green'); 
                updateChallenge();
            }
        }

        function updateSlide() {
            const slide = slides[slideIdx];
            const imgEl = document.getElementById('display-img');
            const voiceArea = document.getElementById('voice-area');
            const instr = document.getElementById('instr');
            const rouletteBox = document.getElementById('roulette-box');

            stopRecording();
            if (recognition) recognition.stop();

            if (slide.type === 'image') {
                imgEl.style.display = 'block';
                voiceArea.style.display = 'none';
                imgEl.src = slide.src;
                
                // 純看圖片時，隱藏導引文字，把空間讓給圖片，解決重疊問題
                instr.style.display = 'none'; 
                
                rouletteBox.style.display = 'flex'; 
                setTrafficLight('red'); 
            } else {
                imgEl.style.display = 'none';
                voiceArea.style.display = 'flex'; 
                
                // 語音模式時再顯示出來
                instr.style.display = 'block';
                instr.innerText = "✨ 換你來挑戰說說看！";
                
                rouletteBox.style.display = 'none'; 
                document.getElementById('speech-result').innerText = "（你說的話會變成字跑出來喔...）";
                document.getElementById('speech-result').style.color = '#2f3542';
                setTrafficLight('green'); 
            }
            
            document.getElementById('page-info').innerText = `${slideIdx + 1} / ${slides.length}`;
            document.getElementById('prev-btn').disabled = (slideIdx === 0);
            document.getElementById('next-btn').disabled = (slideIdx === slides.length - 1);
        }

        function changePage(delta) {
            slideIdx += delta;
            updateSlide();
        }

        function updateChallenge() {
            const q = challengeData[challengeIdx];
            const instr = document.getElementById('instr');
            
            instr.style.display = 'block';
            instr.innerText = q.scenario;
            document.getElementById('display-img').style.display = 'block';
            document.getElementById('voice-area').style.display = 'none';
            document.getElementById('display-img').src = q.img;
            document.getElementById('opt-a').innerText = q.options[0].text;
            document.getElementById('opt-b').innerText = q.options[1].text;
            setTrafficLight('green'); 
        }

        function makeChoice(idx) {
            const q = challengeData[challengeIdx];
            const choice = q.options[idx];
            document.getElementById('fb-icon').innerText = choice.icon;
            document.getElementById('fb-title').innerText = choice.title;
            document.getElementById('fb-desc').innerText = choice.desc;
            document.getElementById('feedback-overlay').style.display = 'flex';
        }

        function closeFeedback() {
            document.getElementById('feedback-overlay').style.display = 'none';
            challengeIdx++;
            if(challengeIdx < challengeData.length) {
                updateChallenge();
            } else {
                alert("🎉 任務挑戰成功！");
                goHome();
            }
        }

        function goHome() {
            stopRecording();
            if (recognition) recognition.stop();
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('game-area').style.display = 'none';
            setTrafficLight('yellow');
        }

        function updateClock() {
            document.getElementById('live-clock').innerText = "時間：" + new Date().toLocaleTimeString('zh-TW', {hour12:false});
        }
        setInterval(updateClock, 1000);
        updateClock();
        setTrafficLight('yellow'); 
    </script>
</body>
</html>
